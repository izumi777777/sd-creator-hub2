{% extends "base.html" %}
{% block title %}インフラコンソール — ログイン{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white border border-gray-200 rounded-xl shadow-sm">
  <h1 class="text-lg font-semibold text-gray-900">インフラコンソール</h1>
  <p class="text-xs text-gray-600 mt-2 leading-relaxed">
    EC2 の起動・停止や Stable Diffusion Web UI（systemd）の再起動を、ポータルから実行します。
    <code class="text-[10px] bg-gray-100 px-1 rounded">.env</code> の <code class="text-[10px] bg-gray-100 px-1 rounded">OPS_CONSOLE_TOKEN</code> を入力してください（未設定の環境ではこの画面は表示されません）。
  </p>
  <form method="post" action="{{ url_for('ops.login') }}" class="mt-6 space-y-4">
    {% if next_url %}
    <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}
    <div>
      <label for="ops-token" class="block text-xs font-medium text-gray-700 mb-1">アクセス用トークン</label>
      <input type="password" id="ops-token" name="token" required autocomplete="off" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono" placeholder="OPS_CONSOLE_TOKEN と同じ文字列">
    </div>
    <button type="submit" class="w-full px-4 py-2 rounded-lg bg-slate-800 text-white text-sm font-medium hover:bg-slate-900">ログイン</button>
  </form>
</div>
{% endblock %}
