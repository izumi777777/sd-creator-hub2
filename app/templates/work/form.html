{% extends "base.html" %}
{% block title %}{% if work %}編集{% else %}新規{% endif %} — 作品{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{% if work %}作品編集{% else %}作品新規{% endif %}</h1>

<form method="post" class="max-w-xl space-y-4 bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">タイトル *</label>
    <input name="title" required value="{{ work.title if work else '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">キャラクター *</label>
    <select name="character_id" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      <option value="">選択してください</option>
      {% for c in characters %}
      <option value="{{ c.id }}" {% if work and work.character_id == c.id %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">紐づくストーリー（任意）</label>
    <select name="story_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      <option value="">なし</option>
      {% for s in stories %}
      <option value="{{ s.id }}" {% if work and work.story_id == s.id %}selected{% endif %}>{{ s.title or '（無題）' }} — {{ s.created_at.strftime('%Y-%m-%d') if s.created_at else '' }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">ステータス</label>
    <select name="status" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      {% set st = work.status if work else 'generating' %}
      <option value="generating" {% if st == 'generating' %}selected{% endif %}>生成中</option>
      <option value="completed" {% if st == 'completed' %}selected{% endif %}>完成</option>
      <option value="pixiv" {% if st == 'pixiv' %}selected{% endif %}>Pixiv投稿済</option>
      <option value="sale" {% if st == 'sale' %}selected{% endif %}>販売中</option>
    </select>
  </div>
  <div class="grid sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">単価（円）</label>
      <input name="price" type="number" min="0" value="{{ work.price if work else 0 }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">PictSpace 販売数</label>
      <input name="sales_pict" type="number" min="0" value="{{ work.sales_pict if work else 0 }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">DLsite 販売数</label>
      <input name="sales_dl" type="number" min="0" value="{{ work.sales_dl if work else 0 }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Pixiv URL</label>
    <input name="pixiv_url" value="{{ work.pixiv_url if work and work.pixiv_url else '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">PictSpace URL</label>
    <input name="pict_url" value="{{ work.pict_url if work and work.pict_url else '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">DLsite URL</label>
    <input name="dl_url" value="{{ work.dl_url if work and work.dl_url else '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
  </div>
  <div class="flex gap-3">
    <button type="submit" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700">保存</button>
    <a href="{{ url_for('work.index') }}" class="px-4 py-2 rounded-lg border border-gray-300 text-sm text-gray-700 hover:bg-gray-50">戻る</a>
  </div>
</form>
{% endblock %}
